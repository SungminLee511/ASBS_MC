# @package _global_

# B6: 25-Mode Grid with Power-Law Weights — ASBS
defaults:
  - /problem: b6_power_law_grid
  - /source: gauss
  - /sde@ref_sde: ve
  - /model@controller: fouriermlp
  - /state_cost: zero
  - /term_cost: corrector_term_cost
  - /matcher@adjoint_matcher: adjoint_ve
  - /model@corrector: fouriermlp
  - /matcher@corrector_matcher: corrector

exp_name: b6_asbs

# === problem params ===
spacing: 6.0
source_sigma: 0.8
zipf_alpha: 1.5

# === source ===
scale: 8

# === sde ===
nfe: 200
sigma_max: 4
sigma_min: 0.01
rescale_t: null

# === training ===
num_epochs: 2000
max_grad_E_norm: null
init_stage: adjoint

adj_num_epochs_per_stage: 100
ctr_num_epochs_per_stage: 20

adjoint_matcher:
  buffer_size: 10000
  duplicates: 10
  resample_size: 512
  num_epochs_per_stage: ${adj_num_epochs_per_stage}
  optim:
    lr: 1e-3
    weight_decay: 1e-7

corrector_matcher:
  buffer_size: 10000
  duplicates: 10
  resample_size: 512
  num_epochs_per_stage: ${ctr_num_epochs_per_stage}
  optim:
    lr: 1e-3
    weight_decay: 1e-7

# === eval & logging ===
use_wandb: false
eval_freq: 50
